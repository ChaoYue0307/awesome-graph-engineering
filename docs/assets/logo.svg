<svg xmlns="http://www.w3.org/2000/svg" width="288" height="288" viewBox="0 0 288 288" role="img" aria-label="Awesome Graph Engineering logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1330"/>
      <stop offset="1" stop-color="#111b3f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="272" height="272" rx="60" fill="url(#bg)"/>
  <rect x="8" y="8" width="272" height="272" rx="60" fill="none" stroke="#2a3866" stroke-width="2"/>

  <circle cx="144" cy="144" r="118" fill="url(#glow)"/>

  <!-- edges -->
  <g stroke="url(#edge)" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <path d="M144 144 L74 92"/>
    <path d="M144 144 L214 84"/>
    <path d="M144 144 L226 168"/>
    <path d="M144 144 L166 222"/>
    <path d="M144 144 L66 196"/>
    <path d="M74 92 L214 84" opacity="0.45"/>
    <path d="M226 168 L166 222" opacity="0.45"/>
    <path d="M66 196 L166 222" opacity="0.45"/>
    <path d="M74 92 L66 196" opacity="0.45"/>
  </g>

  <!-- satellite nodes -->
  <g>
    <circle cx="74" cy="92" r="17" fill="#0d1330" stroke="#7dd3fc" stroke-width="5"/>
    <circle cx="214" cy="84" r="14" fill="#0d1330" stroke="#818cf8" stroke-width="5"/>
    <circle cx="226" cy="168" r="17" fill="#0d1330" stroke="#a78bfa" stroke-width="5"/>
    <circle cx="166" cy="222" r="14" fill="#0d1330" stroke="#c084fc" stroke-width="5"/>
    <circle cx="66" cy="196" r="13" fill="#0d1330" stroke="#38bdf8" stroke-width="5"/>
  </g>

  <!-- hub -->
  <circle cx="144" cy="144" r="30" fill="url(#hub)"/>
  <circle cx="144" cy="144" r="30" fill="none" stroke="#e0f2fe" stroke-width="3" opacity="0.6"/>
  <circle cx="134" cy="134" r="9" fill="#f0f9ff" opacity="0.55"/>
</svg>
