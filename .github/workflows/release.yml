name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Existing version tag to publish, for example v1.3.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Validate, package, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${DISPATCH_VERSION:-$REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Check out the release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Run quality gates
        run: bash scripts/check.sh

      - name: Build deterministic release assets
        run: python3 scripts/build_release.py --version "${{ steps.release.outputs.version }}"

      - name: Verify checksums
        working-directory: dist/release
        run: sha256sum --check SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          asset_prefix="dist/release/awesome-graph-engineering-v$RELEASE_VERSION"
          release_assets=(
            "$asset_prefix-manifest.json"
            "$asset_prefix-social-preview.jpg"
            "$asset_prefix.csv"
            "$asset_prefix.jsonl"
            "$asset_prefix.schema.json"
            "$asset_prefix.zip"
            "dist/release/SHA256SUMS"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${release_assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${release_assets[@]}" \
              --verify-tag \
              --title "Awesome Graph Engineering v$RELEASE_VERSION" \
              --generate-notes
          fi
