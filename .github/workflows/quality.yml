name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Docs and data quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Markdown formatting
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "**/*.md"

      - name: Validate dataset against README
        run: python3 scripts/validate.py

  links:
    name: Link audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --cache
            --max-cache-age 1d
            README.md DEFINITION.md TAXONOMY.md COMPARISON.md ANTI-PATTERNS.md CONTRIBUTING.md
          fail: true
