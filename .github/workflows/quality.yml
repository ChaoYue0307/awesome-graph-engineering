name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Docs and data quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Markdown formatting
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "**/*.md"

      - name: Run repository quality gates
        run: bash scripts/check.sh

  links:
    name: Link audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --cache
            --max-cache-age 1d
            README.md DEFINITION.md METHODOLOGY.md TAXONOMY.md COMPARISON.md
            ANTI-PATTERNS.md CONTRIBUTING.md BRAND.md LAUNCH-KIT.md
            i18n/README.md i18n/*/README.md data/README.md huggingface/README.md
            docs/llms.txt
          fail: true
