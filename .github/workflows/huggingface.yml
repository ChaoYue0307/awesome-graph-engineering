name: Sync Hugging Face dataset

on:
  push:
    branches:
      - main
    paths:
      - "data/resources.jsonl"
      - "data/resources.csv"
      - "data/resource.schema.json"
      - "huggingface/**"
      - "scripts/check.sh"
      - "scripts/publish_huggingface.sh"
      - "scripts/sync.py"
      - "scripts/validate.py"
      - "scripts/validate_i18n.py"
      - ".github/workflows/huggingface.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hugging-face-dataset
  cancel-in-progress: true

jobs:
  publish:
    name: Publish canonical dataset mirror
    runs-on: ubuntu-latest
    env:
      HF_DATASET_REPO: cy0307/awesome-graph-engineering
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run repository quality gates
        run: bash scripts/check.sh

      - name: Check the publishing credential
        id: hf-auth
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [[ -n "$HF_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HF_TOKEN is not configured; validation passed and publishing was skipped."
          fi

      - name: Install the Hugging Face CLI
        if: steps.hf-auth.outputs.available == 'true'
        run: python -m pip install huggingface_hub==0.34.4

      - name: Validate and publish the dataset
        if: steps.hf-auth.outputs.available == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bash scripts/publish_huggingface.sh

      - name: Report a validated dry run
        if: steps.hf-auth.outputs.available != 'true'
        run: echo "The dataset mirror is valid; add the HF_TOKEN repository secret to enable automatic publishing."
