name: Suggest a resource
description: Share a primary source, tool, standard, dataset, case study, or critique for the atlas
title: "[Resource] "
labels: ["resource-suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        Identify the primary source and the engineering decision it informs. Maintainers will normalize the structured record and assign its stable `age-NNNN` ID.

  - type: input
    id: resource_title
    attributes:
      label: Resource title
      description: Use the canonical human-readable title.
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Canonical URL
      description: Prefer the DOI or publisher page for papers and first-party documentation or repository for software.
    validations:
      required: true

  - type: dropdown
    id: scope_relationship
    attributes:
      label: How does it relate to graph engineering?
      options:
        - Directly qualifying AI-agent organization
        - Foundation or overlap, such as classical multi-agent systems
        - Runtime, protocol, or substrate used by agent graphs
        - Benchmark, evaluation, production case study, or critique
        - Unsure — please help classify it
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why should a graph engineer read or use it?
      description: Two or three concrete sentences are enough. Mention the decision, implementation detail, evidence, or limitation it clarifies.
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Most relevant layer (optional)
      options:
        - Not sure
        - Roles
        - Topology
        - Handoffs
        - Work graphs
        - State
        - Gates
        - Reliability
        - Observability & cost
        - Evolution

  - type: textarea
    id: notes
    attributes:
      label: Useful context (optional)
      description: Publication status, maintainers, project status, related entries, or caveats.

  - type: checkboxes
    id: checks
    attributes:
      label: Quick checks
      options:
        - label: I searched the README for the title or URL and did not find a duplicate.
          required: true
        - label: This is not solely graph-data engineering or single-agent tool use, unless it clearly supports an in-scope agent graph.
          required: true
